name: Flutter iOS Deploy
description: Build and deploy Flutter iOS apps via Fastlane

inputs:
  lane:
    description: 'deploy, beta'
    default: 'deploy'
  app_id:
    description: 'App identifier (e.g. com.example.app)'
    default: ''

runs:
  using: 'composite'
  steps:
    - name: Install tools
      uses: jdx/mise-action@v4
      with:
        mise_toml: ${{ github.action_path }}/mise.toml
        cache: false

    - name: Setup fastlane
      working-directory: ios
      run: |
        mkdir -p fastlane
        echo "import '${{ github.action_path }}/fastlane/Fastfile'" > fastlane/Fastfile
        if [ -n "${{ inputs.app_id }}" ]; then
          echo 'app_identifier("${{ inputs.app_id }}")' > fastlane/Appfile
        fi
      shell: bash

    - name: Deploy
      working-directory: ios
      run: doppler run -p deploy -c flutter -- fastlane ios ${{ inputs.lane }}
      shell: bash
