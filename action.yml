name: Flutter Deploy
description: Build and deploy Flutter apps via Fastlane

inputs:
  platform:
    description: 'android, ios, all'
    default: 'all'
  lane:
    description: 'store, distribution'
    default: 'store'

runs:
  using: 'composite'
  steps:
    - name: Install tools
      uses: jdx/mise-action@v4
      with:
        mise_toml: |
          [tools]
          flutter = "latest"
          ruby = "latest"
          "gem:cocoapods" = "latest"
          "gem:fastlane" = "latest"
          "gem:fastlane-plugin-firebase_app_distribution" = "latest"
        cache: false

    - name: Install Doppler CLI
      uses: dopplerhq/cli-action@v4

    - name: Import Fastfiles
      run: |
        echo "import '${{ github.action_path }}/android/Fastfile'" > android/fastlane/Fastfile
        echo "import '${{ github.action_path }}/ios/Fastfile'" > ios/fastlane/Fastfile
      shell: bash

    - name: Deploy Android
      if: inputs.platform == 'android' || inputs.platform == 'all'
      working-directory: android
      run: doppler run -- fastlane android ${{ inputs.lane }}
      shell: bash

    - name: Deploy iOS
      if: inputs.platform == 'ios' || inputs.platform == 'all'
      working-directory: ios
      run: doppler run -- fastlane ios ${{ inputs.lane }}
      shell: bash
