name: Flutter Deploy
description: Build and deploy Flutter apps via Fastlane

inputs:
  lane:
    description: 'deploy, deploy_ios, deploy_android, metadata'
    default: 'deploy'

runs:
  using: 'composite'
  steps:
    - run: |
        doppler setup -p flutter-deploy -c prd --no-interactive
        doppler run -- fastlane ${{ inputs.lane }}
      shell: bash
