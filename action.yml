name: Flutter Deploy
description: Build and deploy Flutter apps for both Android and iOS via Fastlane

inputs:
  lane:
    description: 'deploy, beta'
    default: 'deploy'

runs:
  using: 'composite'
  steps:
    - name: Install tools
      uses: jdx/mise-action@v4
      with:
        mise_toml: |
          [tools]
          flutter = "latest"
          ruby = "latest"
          "gem:cocoapods" = "latest"
          "gem:fastlane" = "latest"
          "gem:fastlane-plugin-firebase_app_distribution" = "latest"
        cache: false

    - name: Install Doppler CLI
      uses: dopplerhq/cli-action@v4

    - name: Deploy Android
      working-directory: android
      run: |
        echo "import '${{ github.action_path }}/android/Fastfile'" > fastlane/Fastfile
        doppler run -- fastlane android ${{ inputs.lane }}
      shell: bash

    - name: Deploy iOS
      working-directory: ios
      run: |
        echo "import '${{ github.action_path }}/ios/Fastfile'" > fastlane/Fastfile
        doppler run -- fastlane ios ${{ inputs.lane }}
      shell: bash
