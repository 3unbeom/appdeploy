name: Flutter Deploy
description: Build and deploy Flutter apps via Fastlane

inputs:
  platform:
    description: 'android, ios, all'
    default: 'all'
  lane:
    description: 'release, beta'
    default: 'release'

runs:
  using: 'composite'
  steps:
    - uses: dopplerhq/cli-action@v4
    - uses: jdx/mise-action@v4
      with:
        cache: false

    - run: mise use flutter ruby gem:fastlane gem:cocoapods gem:aws-sdk-s3 gem:fastlane-plugin-telegram
      shell: bash

    - if: inputs.platform != 'ios'
      working-directory: android
      run: |
        echo "import '${{ github.action_path }}/Fastfile'" > fastlane/Fastfile
        doppler run -- fastlane android ${{ inputs.lane }}
      shell: bash

    - if: inputs.platform != 'android'
      working-directory: ios
      run: |
        echo "import '${{ github.action_path }}/Fastfile'" > fastlane/Fastfile
        doppler run -- fastlane ios ${{ inputs.lane }}
      shell: bash
