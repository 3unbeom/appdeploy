name: Flutter Deploy
description: Build and deploy Flutter apps via Fastlane

inputs:
  android:
    description: 'Deploy Android'
    default: true
  ios:
    description: 'Deploy iOS'
    default: true
  lane:
    description: 'release, beta'
    default: 'release'

runs:
  using: 'composite'
  steps:
    - name: Install mise
      uses: jdx/mise-action@v4

    - name: Install tools
      run: mise use flutter@3 ruby@4 gem:fastlane@2
      shell: bash

    - name: Install CocoaPods
      if: inputs.ios
      run: mise use gem:cocoapods@1
      shell: bash

    - name: Install Firebase plugin
      if: inputs.lane == 'beta'
      run: mise use gem:fastlane-plugin-firebase_app_distribution@1
      shell: bash

    - name: Install Doppler CLI
      uses: dopplerhq/cli-action@v4

    - name: Deploy Android
      if: inputs.android
      working-directory: android
      run: |
        echo "import '${{ github.action_path }}/android.rb'" > fastlane/Fastfile
        doppler run -- fastlane android ${{ inputs.lane }}
      shell: bash

    - name: Deploy iOS
      if: inputs.ios
      working-directory: ios
      run: |
        echo "import '${{ github.action_path }}/ios.rb'" > fastlane/Fastfile
        doppler run -- fastlane ios ${{ inputs.lane }}
      shell: bash
