name: Flutter Deploy
description: Build and deploy Flutter apps via Fastlane

inputs:
  platform:
    description: 'android, ios, all'
    default: 'all'
  lane:
    description: 'store, distribution'
    default: 'store'

runs:
  using: 'composite'
  steps:
    - name: Install mise
      uses: jdx/mise-action@v4

    - name: Install tools
      run: |
        mise use flutter@3 ruby@4 gem:fastlane@2
        if [[ "ios,all" == *"${{ inputs.platform }}"* ]]; then
          mise use gem:cocoapods@1
        fi
        if [[ "${{ inputs.lane }}" == "distribution" ]]; then
          mise use gem:fastlane-plugin-firebase_app_distribution@1
        fi
      shell: bash

    - name: Install Doppler CLI
      uses: dopplerhq/cli-action@v4

    - name: Deploy Android
      if: contains('android,all', inputs.platform)
      working-directory: android
      run: |
        echo "import '${{ github.action_path }}/android/Fastfile'" > fastlane/Fastfile
        doppler run -- fastlane android ${{ inputs.lane }}
      shell: bash

    - name: Deploy iOS
      if: contains('ios,all', inputs.platform)
      working-directory: ios
      run: |
        echo "import '${{ github.action_path }}/ios/Fastfile'" > fastlane/Fastfile
        doppler run -- fastlane ios ${{ inputs.lane }}
      shell: bash
