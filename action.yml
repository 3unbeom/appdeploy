name: Flutter Deploy
description: Build and deploy Flutter apps via Fastlane

inputs:
  lane:
    description: 'deploy, deploy_ios, deploy_android, metadata'
    default: 'deploy'
  flutter-version:
    description: 'Flutter version'
    default: 'latest'

runs:
  using: 'composite'
  steps:
    - uses: jdx/mise-action@v4
      with:
        cache: false
        mise_toml: |
          [tools]
          flutter = "${{ inputs.flutter-version }}"
          ruby = "3.4"
          "gem:cocoapods" = "latest"
          "gem:fastlane" = "latest"
    - run: |
        cp -n "${{ github.action_path }}/fastlane/Fastfile" fastlane || true
        doppler setup -p flutter-deploy -c prd --no-interactive
        doppler run -- fastlane ${{ inputs.lane }}
      shell: bash
