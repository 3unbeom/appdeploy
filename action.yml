name: Flutter Deploy
description: Build and deploy Flutter apps via Fastlane

inputs:
  lane:
    description: 'deploy, ios deploy, android deploy, ios beta'
    default: 'deploy'

runs:
  using: 'composite'
  steps:
    - run: |
        mkdir -p fastlane
        cp ${{ github.action_path }}/fastlane/Fastfile fastlane
        doppler run -p deploy -c prd -- fastlane ${{ inputs.lane }}
      shell: bash
