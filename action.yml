name: Flutter Deploy
description: Build and deploy Flutter apps via Fastlane

inputs:
  lane:
    description: 'deploy, deploy_ios, deploy_android, metadata'
    default: 'deploy'

runs:
  using: 'composite'
  steps:
    - uses: jdx/mise-action@v4
      with:
        cache: false
        mise_toml: |
          [tools]
          flutter = "3.41.5"
          ruby = "3.4"
          "gem:cocoapods" = "latest"
          "gem:fastlane" = "latest"
    - run: mkdir -p fastlane && cp "${{ github.action_path }}/fastlane/Fastfile" fastlane/
      shell: bash
    - run: fastlane ${{ inputs.lane }}
      shell: bash
