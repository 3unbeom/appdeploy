name: Flutter Deploy
description: Build and deploy Flutter apps via Fastlane

inputs:
  lane:
    description: 'ios deploy, android deploy, ios beta'
    required: true
  export_options:
    description: 'Additional ExportOptions.plist entries as JSON (e.g. {"teamID":"XXXXXXXXXX","uploadBitcode":false,"compileBitcode":false})'
    required: false
    default: '{}'

runs:
  using: 'composite'
  steps:
    - run: |
        mkdir -p fastlane
        cp ${{ github.action_path }}/fastlane/Fastfile fastlane
        cp ${{ github.action_path }}/fastlane/Pluginfile fastlane
        cp ${{ github.action_path }}/Gemfile .
        bundle install
        EXPORT_OPTIONS='${{ inputs.export_options }}' doppler run -p deploy -c flutter -- bundle exec fastlane ${{ inputs.lane }}
      shell: bash
