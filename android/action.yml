name: Flutter Android Deploy
description: Build and deploy Flutter Android apps via Fastlane

inputs:
  lane:
    description: 'deploy'
    default: 'deploy'

runs:
  using: 'composite'
  steps:
    - name: Install tools
      uses: jdx/mise-action@v4
      with:
        mise_toml: |
          [tools]
          flutter = "latest"
          ruby = "latest"
          "gem:fastlane" = "latest"
        cache: false

    - name: Deploy
      working-directory: android
      run: |
        mkdir -p fastlane
        echo "import '${{ github.action_path }}/Fastfile'" > fastlane/Fastfile
        doppler run -p deploy -c flutter -- fastlane android ${{ inputs.lane }}
      shell: bash
