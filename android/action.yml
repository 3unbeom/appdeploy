name: Flutter Android Deploy
description: Build and deploy Flutter Android apps via Fastlane

inputs:
  lane:
    description: 'deploy'
    default: 'deploy'
  app_id:
    description: 'App identifier (e.g. com.example.app)'
    default: ''

runs:
  using: 'composite'
  steps:
    - name: Install tools
      uses: jdx/mise-action@v4
      with:
        mise_toml: |
          [tools]
          flutter = "latest"
          ruby = "latest"
          "gem:fastlane" = "latest"
        cache: false

    - name: Setup fastlane
      working-directory: android
      run: |
        mkdir -p fastlane
        echo "import '${{ github.action_path }}/fastlane/Fastfile'" > fastlane/Fastfile
        if [ -n "${{ inputs.app_id }}" ]; then
          echo 'package_name("${{ inputs.app_id }}")' > fastlane/Appfile
        fi
      shell: bash

    - name: Deploy
      working-directory: android
      run: doppler run -p deploy -c flutter -- fastlane android ${{ inputs.lane }}
      shell: bash
